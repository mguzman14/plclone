all:
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    tailscale_key: "{{ lookup('env', 'TS_KEY') }}"
  
  hosts:
    etap:
      ansible_host: "{{ lookup('env', 'HOST1_IP') }}"
      ansible_user: "{{ lookup('env', 'HOST1_USR') }}"
      ansible_become_password: "{{ lookup('env', 'HOST1_PWD') }}"
      ansible_connection: local


      flota_plc:
      - nombre: "plc-bombeo-entrada"
      - nombre: "plc-dosificacion-cloro"
      - nombre: "plc-filtracion"
      - nombre: "plc-bombeo-salida"

  children:
    prod:
      hosts:
        etap:
    dev:
      hosts:
        etap: